<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'" />
  <title>DailyBuddy Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/app.js" defer></script>
</head>
<body>
  <!-- localStorage unavailability warning (shown by JS when needed) -->
  <div id="storage-warning" class="storage-warning" hidden>
    ⚠️ Local storage is unavailable. Your data will not be saved between sessions.
  </div>

  <div class="dashboard">

    <!-- Hero Card: Clock + Greeting -->
    <section class="card hero-card" aria-label="Clock and greeting">
      <div class="clock-section">
        <div id="clock-time" class="clock-time" aria-live="polite" aria-label="Current time">00:00:00</div>
        <div id="clock-date" class="clock-date">Loading date…</div>
      </div>
      <div class="greeting-section">
        <h1 id="greeting" class="greeting">Good Morning, Friend!</h1>
      </div>
    </section>

    <div class="dashboard-grid">

      <!-- Timer Card -->
      <section class="card timer-card" aria-label="Focus timer">
        <h2 class="card-title">Focus Timer</h2>
        <div id="timer-display" class="timer-display" aria-live="polite" aria-label="Timer remaining">25:00</div>
        <div class="timer-controls">
          <button id="timer-start" class="btn btn-primary" type="button">Start</button>
          <button id="timer-stop" class="btn btn-secondary" type="button" disabled>Stop</button>
          <button id="timer-reset" class="btn btn-secondary" type="button">Reset</button>
        </div>
      </section>

      <!-- Tasks Card -->
      <section class="card tasks-card" aria-label="To-do list">
        <div class="card-header">
          <h2 class="card-title">Tasks</h2>
          <button id="edit-tasks-btn" class="btn btn-icon" type="button" aria-label="Edit tasks">✏️ Edit</button>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container" aria-label="Task progress">
          <div
            id="progress-bar"
            class="progress-bar"
            role="progressbar"
            aria-valuenow="0"
            aria-valuemin="0"
            aria-valuemax="100"
            style="width: 0%"
          ></div>
        </div>
        <div id="progress-label" class="progress-label" aria-live="polite">0% complete</div>

        <!-- Add Task Form -->
        <form id="task-form" class="task-form" novalidate>
          <label for="task-input" class="sr-only">New task</label>
          <input
            id="task-input"
            class="task-input"
            type="text"
            placeholder="Add a new task…"
            maxlength="200"
            autocomplete="off"
            aria-label="New task description"
          />
          <button class="btn btn-primary" type="submit">Add</button>
        </form>
        <div id="task-error" class="task-error" role="alert" aria-live="assertive" hidden></div>

        <!-- Task List -->
        <ul id="task-list" class="task-list" aria-label="Task list"></ul>
      </section>

      <!-- Links Card -->
      <section class="card links-card" aria-label="Quick links">
        <h2 class="card-title">Quick Links</h2>
        <div id="links-panel" class="links-panel">
          <!-- Link buttons rendered here by LinksModule -->
        </div>
        <button id="add-link-btn" class="btn btn-secondary" type="button">+ Add Link</button>
      </section>

      <!-- Settings Panel -->
      <section class="card settings-card" aria-label="Settings">
        <h2 class="card-title">Settings</h2>

        <!-- Display Name -->
        <div class="settings-group">
          <label for="name-input" class="settings-label">Display Name</label>
          <div class="settings-row">
            <input
              id="name-input"
              class="settings-input"
              type="text"
              placeholder="Your name"
              maxlength="50"
              autocomplete="off"
              aria-label="Display name"
            />
            <button id="set-name-btn" class="btn btn-primary" type="button">Save</button>
          </div>
        </div>

        <!-- Theme Toggle -->
        <div class="settings-group">
          <span class="settings-label">Theme</span>
          <button id="theme-toggle" class="btn btn-secondary" type="button" aria-label="Toggle dark/light theme">
            🌙 Toggle Theme
          </button>
        </div>

        <!-- Timer Duration -->
        <div class="settings-group">
          <label for="timer-duration-input" class="settings-label">Timer Duration (minutes)</label>
          <div class="settings-row">
            <input
              id="timer-duration-input"
              class="settings-input settings-input--narrow"
              type="number"
              min="1"
              max="120"
              value="25"
              aria-label="Timer duration in minutes"
            />
            <button id="set-timer-duration-btn" class="btn btn-primary" type="button">Set</button>
          </div>
        </div>
      </section>

    </div><!-- /.dashboard-grid -->
  </div><!-- /.dashboard -->

</body>
</html>
